<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">TRC20 USDT 交易紀錄查詢</title>
    <!-- 引入 Pico.css 框架 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><circle cx='50' cy='60' r='50' fill='%2326A17B'/><text x='50' y='100' text-anchor='middle' font-size='80' font-family='Arial, sans-serif' fill='white'>T</text></svg>">
    <link rel="stylesheet" href="css/trc20usdtviewer.css">
    <script src="js/trc20usdtviewer.js" defer></script>
</head>

<body>
    <main class="container">
        <section style="margin-bottom: 0.2rem;">
            <form id="queryForm" action="" method="GET">
                <div class="grid">
                    <div>
                        <label for="addressInput" style="display: flex; align-items: center;">
                            <input type="text" id="addressInput" name="address" placeholder="輸入 TRC20 錢包地址" required
                                style="width: 24rem;">
                            <button id="queryButton" type="button"
                                style="width: 4rem;font-size: inherit; padding: 0.1rem 0.2rem; margin: 0 0.4rem;">查詢</button>
                            <button id="controlButton" type="button" class="contrast"
                                style="width: 4rem;padding: 0.2rem 0.2rem; font-size: 0.8rem; margin: 0 0.4rem;white-space: nowrap; background-color: var(--primary);">暫停載入</button>
                            <button id="clearFiltersButton" class="secondary outline"
                                style="width: 6rem;font-size: 0.8re,; padding: 0.1rem 0.2rem; margin: 0 0.4rem;">清除</button>
                            <button id="languageToggle" type="button" class="secondary"
                                style="width: 4rem;padding: 0.2rem 0.2rem; font-size: 0.8rem; margin: 0 0.4rem; margin-left: auto;">EN/中</button>
                            <!-- 添加一個隱藏的語言輸入欄位，用於保存當前語系 -->
                            <input type="hidden" id="langInput" name="lang" value="">
                        </label>
                    </div>
                </div>
            </form>
        </section>

                        alt="Tronscan" style="width: 64px; height: 64px; vertical-align: middle;">
                </a>
            </div>
            <div>
                <text id="walletBalanceLabel"></text>:
                <span id="usdtBalance" style="color: var(--primary); font-weight: bold; cursor: pointer;"
                    onclick="copyToClipboard(this.textContent, this, event)">0</span> USDT,
                <span id="trxBalance" style="color: var(--primary); font-weight: bold; cursor: pointer;"
                    onclick="copyToClipboard(this.textContent, this, event)">0</span> TRX,
                <text id="energyLabel"></text>:
                <span id="energyBalance" style="color: var(--primary); font-weight: bold;">0</span>
            </div>
            <div>
                <span id="matchedTransactionsLabel"></span>: <span id="totalReceivedLabel"></span>
                <span id="totalReceived" style="color: var(--received-color); font-weight: bold; cursor: pointer;"
                    onclick="copyToClipboard(this.textContent, this, event)">0</span> ,
                <span id="totalSentLabel"></span>
                <span id="totalSent" style="color: var(--sent-color); font-weight: bold; cursor: pointer;"
                    onclick="copyToClipboard(this.textContent, this, event)">0</span>
            </div>
        </section>
        <section style="margin-bottom: 0.2rem;">
            <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; font-size: 0.6rem;">
                <!-- 將所有過濾元件包裝在一個容器中，使用相同的垂直對齊方式 -->
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="number" id="minAmount" placeholder="最小金額" value="1"
                        style="width: 6rem; height:20px; font-size: 0.6rem;">
                    <input type="number" id="maxAmount" placeholder="最大金額"
                        style="width: 6rem; height:20px; font-size: 0.6rem;">
                    <div style="display: flex; align-items: center; gap: 0.2rem;">
                        <select id="peerAddressFilterType"
                            style="width: 4rem; padding: 0; height: 1.5rem; font-size: 0.8rem;"></select>
                        <input type="text" id="peerAddressFilter" placeholder="地址關鍵字"
                            style="width: 10rem; height:1.5rem; font-size: 0.8rem;">
                    </div>
                    <select id="actionFilter" style="width: 80px; padding: 0; height: 1.5rem; font-size: 0.8rem;">
                        <option value="both">全部</option>
                        <option value="received">收款</option>
                        <option value="sent">付款</option>
                    </select>
                    <!-- 時間過濾器 (使用文本輸入確保 24 小時制) -->
                    <!-- 時間過濾器 -->
                    <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                        <div class="date-time-group">
                            <div class="date-input-wrapper">
                                <input type="date" id="startDate" onclick="try{this.showPicker()}catch(e){}"
                                    style="width: auto; height: 1.5rem; font-size: 0.8rem; padding: 0 0.2rem;">
                                <button type="button" id="startTimeToggle" class="time-toggle-btn"
                                    title="指定時間">⏱️</button>
                            </div>
                            <div id="startTimeContainer" style="display: none;">
                                <input type="time" id="startTime" step="1" value="00:00:00"
                                    style="width: auto; height: 1.5rem; font-size: 0.8rem; padding: 0 0.2rem;">
                            </div>
                        </div>
                        <span style="font-size: 0.8rem;">~</span>
                        <div class="date-time-group">
                            <div class="date-input-wrapper">
                                <input type="date" id="endDate" onclick="try{this.showPicker()}catch(e){}"
                                    style="width: auto; height: 1.5rem; font-size: 0.8rem; padding: 0 0.2rem;">
                                <button type="button" id="endTimeToggle" class="time-toggle-btn"
                                    title="指定時間">⏱️</button>
                            </div>
                            <div id="endTimeContainer" style="display: none;">
                                <input type="time" id="endTime" step="1" value="00:00:00"
                                    style="width: auto; height: 1.5rem; font-size: 0.8rem; padding: 0 0.2rem;">
                            </div>
                        </div>

                        <!-- 快速選擇按鈕 -->
                        <div class="quick-btn-group" style="display: flex; gap: 0.2rem;">
                            <button type="button" id="btnToday" class="outline secondary"
                                style="padding: 0.1rem 0.3rem; font-size: 0.7rem; width: auto;">今天</button>
                            <button type="button" id="btn3Days" class="outline secondary"
                                style="padding: 0.1rem 0.3rem; font-size: 0.7rem; width: auto;">3天內</button>
                            <button type="button" id="btnWeek" class="outline secondary"
                                style="padding: 0.1rem 0.3rem; font-size: 0.7rem; width: auto;">一週內</button>
                        </div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <div id="status" style="font-size: 0.8rem;">等待查詢...</div>
                    <div id="resultCount" style="white-space: nowrap;"></div>
                </div>
            </div>
        </section>

        <section>
            <div id="results">
                <table>
                    <thead style="font-size: 0.75rem;">
                        <tr>
                            <th style="width: 16ch; font-weight: normal; white-space: normal; line-height: 1.1;"
                                class="sortable" data-field="timestamp" id="timeHeader" title="點擊可切換時間模式"><span
                                    class="time-display" onclick="toggleTimeDisplayMode()"></span><span
                                    class="sort-icon" onclick="sortTransactions('timestamp')"></span></th>
                            <th style="width: 16ch; font-weight: normal;">交易 ID</th>
                            <th style="width: 6ch; font-weight: normal;" class="sortable" data-field="action"><span
                                    class="text-content" onclick="sortTransactions('action')">類型</span><span
                                    class="sort-icon" onclick="sortTransactions('action')"></span></th>
                            <th style="width: 16ch; font-weight: normal;" class="sortable" data-field="value"><span
                                    class="text-content" onclick="sortTransactions('value')">金額</span><span
                                    class="sort-icon" onclick="sortTransactions('value')"></span></th>
                            <th style="width: 32h; font-weight: normal;">對方地址</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="loadingStatusMessage"
                    style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--primary); display: none;">
                    <!-- 載入狀態訊息會在這裡顯示 -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <small id="footerText"> 2025 TRC20 USDT 交易紀錄查詢 | 使用 <a href="https://picocss.com"
                    target="_blank">Pico.css</a></small>
        </div>
    </footer>
</body>

</html>
