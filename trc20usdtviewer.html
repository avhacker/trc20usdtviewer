<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">TRC20 USDT 交易紀錄查詢</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><circle cx='50' cy='60' r='50' fill='%2326A17B'/><text x='50' y='100' text-anchor='middle' font-size='80' font-family='Arial, sans-serif' fill='white'>T</text></svg>">
    <link rel="stylesheet" href="css/trc20usdtviewer.css?v=20260313c">
    <script src="js/trc20usdtviewer.js?v=20260313b" defer></script>
</head>

<body>
    <main class="container">
        <!-- Control Bar -->
        <div class="control-bar">
            <form id="queryForm" action="" method="GET" class="control-bar__form">
                <input type="text" id="addressInput" name="address"
                    class="control-bar__input"
                    placeholder="輸入 TRC20 錢包地址"
                    required>
                <input type="hidden" id="langInput" name="lang" value="">
            </form>
            <div class="control-bar__buttons">
                <button id="queryButton" type="button" class="btn btn--primary">查詢</button>
                <button id="controlButton" type="button" class="btn btn--primary">暫停載入</button>
                <button id="clearFiltersButton" type="button" class="btn btn--secondary">清除</button>
            </div>
            <div class="control-bar__lang">
                <button id="languageToggle" type="button" class="btn btn--outline btn--sm">EN/中</button>
            </div>
        </div>

            <span id="trxBalance" class="wallet-info__value" onclick="copyToClipboard(this.textContent, this, event)">0</span> <span class="wallet-info__separator">TRX</span> |
            <span class="wallet-info__label" id="energyLabel"></span>: <span id="energyBalance" class="wallet-info__value">0</span>
        </div>

        <!-- Summary Stats -->
        <div class="summary-stats">
            <span class="summary-stats__label" id="matchedTransactionsLabel"></span>: <span class="summary-stats__label" id="totalReceivedLabel"></span> <span id="totalReceived" class="summary-stats__value summary-stats__value--received" onclick="copyToClipboard(this.textContent, this, event)">0</span>, <span class="summary-stats__label" id="totalSentLabel"></span> <span id="totalSent" class="summary-stats__value summary-stats__value--sent" onclick="copyToClipboard(this.textContent, this, event)">0</span>
        </div>

        <!-- Filter Panel -->
        <div class="filter-panel" id="filterPanel">
            <button type="button" class="btn btn--secondary filter-panel__toggle" id="filterToggle">
                <span id="filterToggleText">過濾條件</span>
                <span class="filter-panel__toggle-icon">▼</span>
            </button>
            <div class="filter-panel__content" id="filterContent">
                <!-- Amount filters -->
                <div class="filter-panel__group">
                    <input type="number" id="minAmount"
                        class="filter-panel__input filter-panel__input--amount"
                        placeholder="最小金額" value="1">
                    <span class="filter-panel__datetime-separator">-</span>
                    <input type="number" id="maxAmount"
                        class="filter-panel__input filter-panel__input--amount"
                        placeholder="最大金額">
                </div>

                <!-- Peer address filter -->
                <div class="filter-panel__group">
                    <select id="peerAddressFilterType" class="filter-panel__select filter-panel__select--type"></select>
                    <input type="text" id="peerAddressFilter"
                        class="filter-panel__input filter-panel__input--address"
                        placeholder="地址關鍵字">
                </div>

                <!-- Action filter -->
                <div class="filter-panel__group">
                    <select id="actionFilter" class="filter-panel__select filter-panel__select--action">
                        <option value="both">全部</option>
                        <option value="received">收款</option>
                        <option value="sent">付款</option>
                    </select>
                </div>

                <!-- Date/Time filters -->
                <div class="filter-panel__datetime">
                    <div class="date-time-group">
                        <div class="date-input-wrapper">
                            <input type="date" id="startDate"
                                class="filter-panel__input"
                                onclick="try{this.showPicker()}catch(e){}">
                            <button type="button" id="startTimeToggle" class="time-toggle-btn" title="指定時間">⏱️</button>
                        </div>
                        <div id="startTimeContainer" class="filter-panel__time-container" style="display: none;">
                            <input type="time" id="startTime"
                                class="filter-panel__input"
                                step="1" value="00:00:00">
                        </div>
                    </div>
                    <span class="filter-panel__datetime-separator">~</span>
                    <div class="date-time-group">
                        <div class="date-input-wrapper">
                            <input type="date" id="endDate"
                                class="filter-panel__input"
                                onclick="try{this.showPicker()}catch(e){}">
                            <button type="button" id="endTimeToggle" class="time-toggle-btn" title="指定時間">⏱️</button>
                        </div>
                        <div id="endTimeContainer" class="filter-panel__time-container" style="display: none;">
                            <input type="time" id="endTime"
                                class="filter-panel__input"
                                step="1" value="00:00:00">
                        </div>
                    </div>
                </div>

                <!-- Quick time buttons -->
                <div class="filter-panel__quick-buttons">
                    <button type="button" id="btnToday" class="btn btn--outline btn--sm">今天</button>
                    <button type="button" id="btn3Days" class="btn btn--outline btn--sm">3天內</button>
                    <button type="button" id="btnWeek" class="btn btn--outline btn--sm">一週內</button>
                </div>

                <!-- Status -->
                <div class="status-bar">
                    <div id="status" class="status-bar__text">等待查詢...</div>
                    <div id="resultCount" class="status-bar__count"></div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <section class="results" id="results">
            <!-- Desktop Table View -->
            <table>
                <thead>
                    <tr>
                        <th class="sortable" data-field="timestamp" id="timeHeader" title="點擊可切換時間模式">
                            <span class="time-display" onclick="toggleTimeDisplayMode()"></span>
                            <span class="sort-icon" onclick="sortTransactions('timestamp')"></span>
                        </th>
                        <th>交易 ID</th>
                        <th class="sortable" data-field="action">
                            <span class="text-content" onclick="sortTransactions('action')">類型</span>
                            <span class="sort-icon" onclick="sortTransactions('action')"></span>
                        </th>
                        <th class="sortable" data-field="value">
                            <span class="text-content" onclick="sortTransactions('value')">金額</span>
                            <span class="sort-icon" onclick="sortTransactions('value')"></span>
                        </th>
                        <th>對方地址</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <!-- Mobile Card View -->
            <div class="transaction-cards" id="transactionCards"></div>

            <!-- Loading Status -->
            <div id="loadingStatusMessage"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <small id="footerText"> 2025 TRC20 USDT 交易紀錄查詢 | 使用 <a href="https://picocss.com"
                    target="_blank">Pico.css</a></small>
        </div>
    </footer>
</body>

</html>
